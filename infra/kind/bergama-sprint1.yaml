# Sprint 1 local Kind cluster — pinned for gate evidence.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: bergama-sprint1
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
    extraMounts:
      - hostPath: __REPO_ROOT__
        containerPath: /bergama-repo
        readOnly: true
