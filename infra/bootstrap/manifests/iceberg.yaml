apiVersion: v1
kind: Service
metadata:
  name: iceberg-catalog
  namespace: platform
  labels:
    app.kubernetes.io/name: iceberg-catalog
    app.kubernetes.io/part-of: platform-foundation
spec:
  ports:
    - port: 8181
      targetPort: 8181
  selector:
    app.kubernetes.io/name: iceberg-catalog
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-catalog
  namespace: platform
  labels:
    app.kubernetes.io/name: iceberg-catalog
    app.kubernetes.io/part-of: platform-foundation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: iceberg-catalog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iceberg-catalog
        app.kubernetes.io/part-of: platform-foundation
    spec:
      containers:
        - name: catalog
          image: tabulario/iceberg-rest:1.6.0
          ports:
            - containerPort: 8181
          env:
            - name: CATALOG_WAREHOUSE
              value: s3://bergama-warehouse/
            - name: CATALOG_IO__IMPL
              value: org.apache.iceberg.aws.s3.S3FileIO
            - name: CATALOG_S3_ENDPOINT
              value: http://minio.platform.svc.cluster.local:9000
            - name: CATALOG_S3_PATH_STYLE_ACCESS
              value: "true"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: rootUser
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: rootPassword
            - name: AWS_REGION
              value: us-east-1
          readinessProbe:
            httpGet:
              path: /v1/config
              port: 8181
            initialDelaySeconds: 15
            periodSeconds: 10
