---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: platform
  labels:
    app.kubernetes.io/name: tempo
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            http:
            grpc:
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
    metrics_generator:
      registry:
        external_labels:
          source: tempo
      storage:
        path: /var/tempo/generator
    overrides:
      defaults:
        metrics_generator:
          processors: [service-graphs, span-metrics]
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: platform
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/part-of: platform-foundation
spec:
  ports:
    - port: 3200
      targetPort: 3200
  selector:
    app.kubernetes.io/name: tempo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: platform
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/part-of: platform-foundation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tempo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tempo
        app.kubernetes.io/part-of: platform-foundation
    spec:
      containers:
        - name: tempo
          image: grafana/tempo@sha256:4443be217c396b065ee34845534199c36fdba4dc619cb96550e228d73fba6e69
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - containerPort: 3200
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
          readinessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 20
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          emptyDir: {}
