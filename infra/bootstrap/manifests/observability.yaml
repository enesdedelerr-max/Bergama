apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: platform
  labels:
    app.kubernetes.io/name: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: redis-exporter
        static_configs:
          - targets: ["redis-exporter.platform.svc.cluster.local:9121"]
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: platform
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: platform-foundation
spec:
  ports:
    - port: 9090
      targetPort: 9090
  selector:
    app.kubernetes.io/name: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: platform
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: platform-foundation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: platform-foundation
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus@sha256:6927e0919a144aa7616fd0137d4816816d42f6b816de3af269ab065250859a62
          args: ["--config.file=/etc/prometheus/prometheus.yml", "--web.enable-lifecycle"]
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: platform
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: platform-foundation
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app.kubernetes.io/name: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: platform
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: platform-foundation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: platform-foundation
    spec:
      containers:
        - name: grafana
          image: grafana/grafana@sha256:62d2b9d20a19714ebfe48d1bb405086081bc602aa053e28cf6d73c7537640dfb
          ports:
            - containerPort: 3000
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
---
