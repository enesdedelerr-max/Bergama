apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: platform
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: platform-foundation
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/name: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: platform
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: metrics
spec:
  ports:
    - name: metrics
      port: 9121
      targetPort: 9121
  selector:
    app.kubernetes.io/name: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: platform
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: platform-foundation
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: platform-foundation
    spec:
      containers:
        - name: redis
          image: redis@sha256:fbdbaea47b9ae4ecc2082ecdb4e1cea81e32176ffb1dcf643d422ad07427e5d9
          ports:
            - containerPort: 6379
          command: ["redis-server", "--save", "60", "1", "--dir", "/data"]
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.67.0
          ports:
            - containerPort: 9121
          env:
            - name: REDIS_ADDR
              value: redis://127.0.0.1:6379
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9121
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: redis
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
