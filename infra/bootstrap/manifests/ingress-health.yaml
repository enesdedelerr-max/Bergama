apiVersion: v1
kind: Service
metadata:
  name: health-check
  namespace: platform
  labels:
    app.kubernetes.io/name: health-check
    app.kubernetes.io/part-of: platform-foundation
spec:
  selector:
    app.kubernetes.io/name: health-check
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-check
  namespace: platform
  labels:
    app.kubernetes.io/name: health-check
    app.kubernetes.io/part-of: platform-foundation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: health-check
  template:
    metadata:
      labels:
        app.kubernetes.io/name: health-check
        app.kubernetes.io/part-of: platform-foundation
    spec:
      containers:
        - name: health
          image: hashicorp/http-echo:0.2.3
          args: ["-text=ok", "-listen=:8080"]
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-health
  namespace: platform
  labels:
    app.kubernetes.io/part-of: platform-foundation
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: health-check
                port:
                  number: 80
