# Local development secret template (Issue #196)
# Copy values via an untracked mechanism. Do not commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: platform
  labels:
    bergama.io/secret-ref: "true"
    bergama.io/secret-template: local
type: Opaque
stringData:
  username: "${SECRETREF:postgresql.username}"
  password: "${SECRETREF:postgresql.password}"
