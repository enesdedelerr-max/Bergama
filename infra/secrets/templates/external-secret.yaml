# External Secrets Operator template (Issue #196)
# Vault is not required; backend can be any ClusterSecretStore.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgresql-credentials
  namespace: platform
  labels:
    bergama.io/secret-ref: "true"
    bergama.io/secret-template: external
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: platform-secret-store
    kind: ClusterSecretStore
  target:
    name: postgresql-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: paper/platform/postgresql/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: paper/platform/postgresql/credentials
        property: password
