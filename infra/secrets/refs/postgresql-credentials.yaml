# Secret reference only — no credential values.
# Injected at deploy time from an external secret store / sealed source.
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: platform
  labels:
    app.kubernetes.io/part-of: platform-foundation
    bergama.io/secret-ref: "true"
type: Opaque
stringData:
  # PLACEHOLDER_REF — replaced by external injection; must not contain real secrets.
  username: "${SECRETREF:postgresql.username}"
  password: "${SECRETREF:postgresql.password}"
