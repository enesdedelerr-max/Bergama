# Secrets policy for Sprint 1 foundation (Issue #196).
# Real credentials must never be committed. Use secret references only.

policy_version: 1
sprint: "1"

rules:
  - never_commit_secrets: true
  - never_embed_default_production_credentials: true
  - separate_paper_sandbox_live: true
  - prefer_secret_references: true

forbidden_literal_patterns:
  - '(?i)password\s*=\s*["'']?(admin|password|changeme|secret|root|123456)'
  - '(?i)POSTGRES_PASSWORD\s*=\s*["'']?(postgres|admin|password|changeme)'
  - '(?i)REDIS_PASSWORD\s*=\s*["'']?(redis|admin|password|changeme)'
  - '(?i)AWS_SECRET_ACCESS_KEY\s*=\s*["'']?[A-Za-z0-9/+=]{20,}'
  - '(?i)BEGIN (RSA |OPENSSH )?PRIVATE KEY'
  - '(?i)api[_-]?key\s*=\s*["'']?[A-Za-z0-9_\-]{16,}'

allowed_example_files:
  - infra/secrets/refs/.env.example
  - infra/secrets/refs/README.md

required_secret_refs:
  - name: postgresql-credentials
    path: infra/secrets/refs/postgresql-credentials.yaml
  - name: redis-credentials
    path: infra/secrets/refs/redis-credentials.yaml
  - name: minio-credentials
    path: infra/secrets/refs/minio-credentials.yaml
  - name: argocd-admin
    path: infra/secrets/refs/argocd-admin.yaml

environments:
  - paper
  - sandbox
  - live
