[project]
name = "bergama-strategy-sdk"
version = "0.1.0"
description = "Bergama Strategy SDK — author-facing contracts for Sprint 4 #406"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.10.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "ruff>=0.9.0",
    "mypy>=1.14.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bergama_strategy_sdk"]

[tool.ruff]
target-version = "py313"
line-length = 100
src = ["src/bergama_strategy_sdk", "tests"]

[tool.mypy]
python_version = "3.13"
strict = true
packages = ["bergama_strategy_sdk"]
mypy_path = "src"
